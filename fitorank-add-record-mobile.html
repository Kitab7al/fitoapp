<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FitoRank — Добавить рекорд</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --black:#080808; --white:#f5f2ee; --red:#e8260b; --red-dark:#b51e08;
  --gray:#1a1a1a; --gray-mid:#2e2e2e; --gray-light:#888;
  --green:#3ddc84; --gold:#f5c842; --blue:#4a9eff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;overflow:hidden;}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

/* LANG */
.lang-switcher{position:fixed;top:16px;right:16px;z-index:200;display:flex;background:rgba(26,26,26,.92);border:1px solid var(--gray-mid);backdrop-filter:blur(8px);overflow:hidden;}
.lang-btn{background:none;border:none;color:var(--gray-light);font-family:'Montserrat',sans-serif;font-size:.55rem;font-weight:700;letter-spacing:.1em;padding:7px 11px;cursor:pointer;transition:all .2s;}
.lang-btn.active{background:var(--red);color:var(--white);}

/* SCREENS */
.screens{position:fixed;inset:0;z-index:1;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateX(32px);transition:opacity .3s ease,transform .3s ease;overflow-y:auto;overflow-x:hidden;}
.screen.active{opacity:1;pointer-events:all;transform:translateX(0);}
.screen.exit{opacity:0;transform:translateX(-32px);}

/* HEADER */
.sh-header{padding:calc(env(safe-area-inset-top,0px) + 52px) 24px 22px;border-bottom:1px solid var(--gray-mid);flex-shrink:0;}
.back-btn{display:flex;align-items:center;gap:7px;color:var(--gray-light);font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:none;border:none;cursor:pointer;padding:0;margin-bottom:20px;}
.back-btn svg{width:14px;height:14px;flex-shrink:0;}
.sh-tag{font-size:.52rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--red);margin-bottom:6px;}
.sh-title{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;line-height:1.05;margin-bottom:4px;}
.sh-sub{font-size:.66rem;color:var(--gray-light);line-height:1.6;}
.step-dots{display:flex;gap:6px;margin-top:12px;}
.dot{width:20px;height:3px;background:var(--gray-mid);border-radius:2px;transition:all .3s;}
.dot.active{background:var(--red);width:32px;}
.dot.done{background:var(--green);}

/* FORM */
.form-body{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;padding-bottom:8px;}
.form-footer{padding:12px 24px calc(env(safe-area-inset-bottom,0px) + 20px);flex-shrink:0;border-top:1px solid rgba(255,255,255,.06);background:var(--black);}

/* FIELD */
.field{display:flex;flex-direction:column;gap:6px;}
.field-label{font-size:.52rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gray-light);}
.field-input{background:var(--gray);border:1px solid var(--gray-mid);color:var(--white);font-family:'Montserrat',sans-serif;font-size:1rem;font-weight:600;padding:14px;outline:none;transition:border-color .2s;-webkit-appearance:none;border-radius:0;width:100%;}
.field-input::placeholder{color:var(--gray-light);font-weight:400;font-size:.85rem;}
.field-input:focus{border-color:var(--red);}
.field-input[type="date"]{color-scheme:dark;}

/* EXERCISE SEARCH */
.ex-search-wrap{position:relative;}
.ex-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray-light);font-size:.9rem;pointer-events:none;}
.field-input.with-icon{padding-left:40px;}
.ex-results{background:var(--gray);border:1px solid var(--gray-mid);border-top:none;display:none;max-height:190px;overflow-y:auto;}
.ex-results.show{display:block;}
.ex-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;transition:background .15s;}
.ex-item:last-child{border-bottom:none;}
.ex-item:active{background:var(--gray-mid);}
.ex-item-name{font-size:.8rem;font-weight:600;}
.ex-item-cat{font-size:.52rem;color:var(--gray-light);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.ex-selected{background:rgba(232,38,11,.08);border:1px solid rgba(232,38,11,.3);padding:12px 14px;display:none;align-items:center;justify-content:space-between;}
.ex-selected.show{display:flex;}
.ex-sel-name{font-size:.85rem;font-weight:700;}
.ex-sel-cat{font-size:.52rem;color:var(--red);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.ex-sel-clear{background:none;border:none;color:var(--gray-light);font-size:1.1rem;cursor:pointer;padding:4px;}

/* TYPE TABS (1RM / Reps) */
.type-tabs{display:flex;gap:0;border:1px solid var(--gray-mid);overflow:hidden;}
.type-tab{flex:1;background:none;border:none;color:var(--gray-light);font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:12px 8px;cursor:pointer;transition:all .2s;border-right:1px solid var(--gray-mid);}
.type-tab:last-child{border-right:none;}
.type-tab.active{background:var(--red);color:var(--white);}
.type-tab:active{opacity:.8;}

/* BODYWEIGHT TOGGLE */
.bw-toggle{display:none;flex-direction:column;gap:8px;}
.bw-toggle.show{display:flex;}
.bw-options{display:flex;gap:8px;flex-wrap:wrap;}
.bw-chip{flex:1;min-width:0;background:var(--gray);border:1px solid var(--gray-mid);color:var(--gray-light);font-family:'Montserrat',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:10px 8px;cursor:pointer;text-align:center;transition:all .2s;white-space:nowrap;}
.bw-chip.active{background:var(--red);border-color:var(--red);color:var(--white);}
.bw-chip:active{transform:scale(.95);}

/* WEIGHT ROW */
.weight-row{display:flex;gap:10px;align-items:flex-end;}
.weight-wrap{position:relative;flex:1;}
.weight-unit-toggle{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:center;}
.unit-btn{height:100%;padding:0 12px;background:var(--gray-mid);border:none;border-left:1px solid #3a3a3a;color:var(--gray-light);font-family:'Montserrat',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .2s;}
.unit-btn.active{background:var(--red);color:var(--white);}
.field-input.weight-input{padding-right:96px;}

/* REPS INPUT */
.reps-wrap{display:flex;flex-direction:column;gap:6px;}
.reps-quick{display:flex;gap:6px;flex-wrap:wrap;}
.rep-chip{background:var(--gray);border:1px solid var(--gray-mid);color:var(--gray-light);font-family:'Montserrat',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.06em;padding:9px 13px;cursor:pointer;transition:all .2s;}
.rep-chip.active{background:var(--red);border-color:var(--red);color:var(--white);}
.rep-chip:active{transform:scale(.93);}
.reps-custom-wrap{display:none;}
.reps-custom-wrap.show{display:flex;gap:8px;align-items:center;}
.reps-custom-label{font-size:.6rem;color:var(--gray-light);white-space:nowrap;}
.field-input.reps-input{width:90px;text-align:center;font-size:1.1rem;}

/* LEVEL BADGE */
.level-badge{display:none;padding:12px 14px;gap:12px;align-items:center;animation:fadeUp .25s ease;}
.level-badge.show{display:flex;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.level-icon{font-size:1.8rem;flex-shrink:0;line-height:1;}
.level-info{flex:1;}
.level-name{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:.04em;line-height:1;}
.level-desc{font-size:.58rem;color:var(--gray-light);margin-top:2px;line-height:1.5;}
.level-bar-wrap{height:4px;background:var(--gray-mid);margin-top:8px;overflow:hidden;}
.level-bar{height:100%;transition:width .5s ease;width:0%;}
.level-next{font-size:.52rem;color:var(--gray-light);margin-top:5px;letter-spacing:.06em;}

/* PREVIEW CARD */
.preview-card{background:var(--gray-mid);border:1px solid rgba(255,255,255,.08);padding:13px 14px;display:flex;gap:12px;align-items:center;}
.pc-media{width:44px;height:44px;background:var(--gray);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:1px solid rgba(255,255,255,.08);}
.pc-exercise{font-size:.5rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray-light);margin-bottom:2px;}
.pc-weight{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;line-height:1;}
.pc-unit{font-size:.75rem;color:var(--gray-light);}
.pc-meta{font-size:.55rem;color:var(--gray-light);margin-top:2px;}

/* BUTTONS */
.btn-p{width:100%;background:var(--red);color:var(--white);border:none;font-family:'Montserrat',sans-serif;font-size:.78rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase;padding:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s,transform .1s;-webkit-appearance:none;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);}
.btn-p:active{background:var(--red-dark);transform:scale(.98);}
.btn-p:disabled{opacity:.4;pointer-events:none;}
.btn-s{width:100%;background:transparent;color:var(--white);border:1px solid var(--gray-mid);font-family:'Montserrat',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color .2s;-webkit-appearance:none;}
.btn-s:active{border-color:var(--white);}

/* STEP 2 */
.url-wrap{position:relative;}
.url-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.9rem;pointer-events:none;}
.field-input.url-input{padding-left:40px;font-size:.82rem;}
.link-preview{background:var(--gray);border:1px solid var(--gray-mid);padding:13px;display:none;gap:11px;align-items:flex-start;animation:fadeUp .25s ease;}
.link-preview.show{display:flex;}
.lp-thumb{width:56px;height:56px;background:var(--gray-mid);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
.lp-platform{font-size:.5rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:3px;}
.lp-title{font-size:.75rem;font-weight:600;line-height:1.4;}
.lp-handle{font-size:.58rem;color:var(--gray-light);margin-top:2px;}
.lp-ok{font-size:.52rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-top:5px;}
.url-hint{font-size:.56rem;color:var(--gray-light);margin-top:5px;line-height:1.6;}
.field-textarea{background:var(--gray);border:1px solid var(--gray-mid);color:var(--white);font-family:'Montserrat',sans-serif;font-size:.85rem;font-weight:400;padding:14px;outline:none;transition:border-color .2s;-webkit-appearance:none;border-radius:0;width:100%;resize:none;min-height:86px;line-height:1.6;}
.field-textarea::placeholder{color:var(--gray-light);}
.field-textarea:focus{border-color:var(--red);}
.char-count{font-size:.52rem;color:var(--gray-light);text-align:right;margin-top:3px;}

/* SUCCESS */
#s-success{justify-content:center;align-items:center;text-align:center;padding:40px 28px;background:radial-gradient(ellipse 80% 45% at 50% 35%,rgba(61,220,132,.07) 0%,transparent 70%);}
.success-icon{font-size:3.4rem;margin-bottom:14px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-title{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1;margin-bottom:8px;}
.success-sub{font-size:.7rem;color:var(--gray-light);line-height:1.7;margin-bottom:24px;max-width:280px;}
.success-card{background:var(--gray);border:1px solid var(--gray-mid);padding:16px 18px;width:100%;max-width:300px;margin:0 auto 24px;text-align:left;border-left:3px solid var(--green);}
.sc-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.sc-label{font-size:.5rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gray-light);}
.sc-val{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;line-height:1;}
.sc-sub{font-size:.58rem;color:var(--gray-light);margin-top:5px;}
.success-actions{width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px;}
</style>
</head>
<body>

<div class="lang-switcher">
  <button class="lang-btn" id="btn-ru" onclick="setLang('ru')">RU</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
</div>

<div class="screens">

  <!-- ══ ШАГ 1 ══ -->
  <div class="screen" id="s-step1">
    <div class="sh-header">
      <button class="back-btn" onclick="goFeed()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 12L6 8l4-4"/></svg>
        <span data-t="back"></span>
      </button>
      <div class="sh-tag"   data-t="s1_tag"></div>
      <div class="sh-title" data-t="s1_title"></div>
      <div class="sh-sub"   data-t="s1_sub"></div>
      <div class="step-dots"><div class="dot active"></div><div class="dot"></div></div>
    </div>

    <div class="form-body">

      <!-- EXERCISE -->
      <div class="field">
        <div class="field-label" data-t="ex_label"></div>
        <div class="ex-search-wrap">
          <span class="ex-search-icon">🔍</span>
          <input class="field-input with-icon" id="exInput" type="text"
            oninput="searchEx(this.value)" onfocus="searchEx(this.value)"
            data-t-ph="ex_ph">
          <div class="ex-results" id="exResults"></div>
        </div>
        <div class="ex-selected" id="exSelected">
          <div><div class="ex-sel-name" id="exSelName"></div><div class="ex-sel-cat" id="exSelCat"></div></div>
          <button class="ex-sel-clear" onclick="clearEx()">✕</button>
        </div>
      </div>

      <!-- RECORD TYPE TABS -->
      <div class="field">
        <div class="field-label" data-t="type_label"></div>
        <div class="type-tabs">
          <button class="type-tab active" id="tab1rm"  onclick="setType('1rm')"  data-t="tab_1rm"></button>
          <button class="type-tab"        id="tabReps" onclick="setType('reps')" data-t="tab_reps"></button>
        </div>
      </div>

      <!-- BODYWEIGHT TOGGLE (shown for bodyweight exercises) -->
      <div class="bw-toggle" id="bwToggle">
        <div class="field-label" data-t="bw_label"></div>
        <div class="bw-options">
          <button class="bw-chip active" onclick="setBW(this,'bw')"     data-t="bw_only"></button>
          <button class="bw-chip"        onclick="setBW(this,'bw+ext')" data-t="bw_plus"></button>
          <button class="bw-chip"        onclick="setBW(this,'ext')"    data-t="bw_ext"></button>
        </div>
      </div>

      <!-- WEIGHT -->
      <div class="field" id="weightField">
        <div class="field-label" id="weightLabel" data-t="weight_label"></div>
        <div class="weight-row">
          <div class="weight-wrap" style="flex:1">
            <input class="field-input weight-input" id="weightInput" type="number"
              inputmode="decimal" min="0" max="9999" step="0.5"
              oninput="onWeightInput()">
            <div class="weight-unit-toggle">
              <button class="unit-btn active" id="btnKg"  onclick="setUnit('kg')">КГ</button>
              <button class="unit-btn"        id="btnLbs" onclick="setUnit('lbs')">LBS</button>
            </div>
          </div>
        </div>
      </div>

      <!-- REPS (1RM = fixed 1, multi = editable) -->
      <div class="field" id="repsField">
        <div class="field-label" data-t="reps_label"></div>
        <!-- 1RM mode: quick chips -->
        <div class="reps-quick" id="repsQuick">
          <button class="rep-chip active" onclick="setRep(this,1)">1</button>
          <button class="rep-chip"        onclick="setRep(this,2)">2</button>
          <button class="rep-chip"        onclick="setRep(this,3)">3</button>
          <button class="rep-chip"        onclick="setRep(this,5)">5</button>
        </div>
        <!-- Reps mode: free input -->
        <div class="reps-custom-wrap" id="repsCustom">
          <input class="field-input reps-input" id="repsInput" type="number"
            inputmode="numeric" min="1" max="999" value="10"
            oninput="onRepsInput()">
          <span class="reps-custom-label" data-t="reps_unit"></span>
        </div>
      </div>

      <!-- LIVE LEVEL BADGE -->
      <div class="level-badge" id="levelBadge">
        <div class="level-icon"     id="lvlIcon"></div>
        <div class="level-info">
          <div class="level-name"   id="lvlName"></div>
          <div class="level-desc"   id="lvlDesc"></div>
          <div class="level-bar-wrap"><div class="level-bar" id="lvlBar"></div></div>
          <div class="level-next"   id="lvlNext"></div>
        </div>
      </div>

      <!-- DATE -->
      <div class="field">
        <div class="field-label" data-t="date_label"></div>
        <input class="field-input" id="dateInput" type="date" onchange="checkStep1()">
      </div>

      <!-- PREVIEW -->
      <div class="preview-card">
        <div class="pc-media" id="pcMedia">🏋️</div>
        <div>
          <div class="pc-exercise" id="pcExercise" data-t="no_ex"></div>
          <div class="pc-weight"><span id="pcWeight">—</span><span class="pc-unit" id="pcUnit"></span></div>
          <div class="pc-meta" id="pcMeta"></div>
        </div>
      </div>

    </div>
    <div class="form-footer">
      <button class="btn-p" id="s1Btn" onclick="goStep2()" disabled>
        <span data-t="s1_cta"></span><span>→</span>
      </button>
    </div>
  </div>

  <!-- ══ ШАГ 2 ══ -->
  <div class="screen" id="s-step2">
    <div class="sh-header">
      <button class="back-btn" onclick="go('s-step1')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 12L6 8l4-4"/></svg>
        <span data-t="back"></span>
      </button>
      <div class="sh-tag"   data-t="s2_tag"></div>
      <div class="sh-title" data-t="s2_title"></div>
      <div class="sh-sub"   data-t="s2_sub"></div>
      <div class="step-dots"><div class="dot done"></div><div class="dot active"></div></div>
    </div>

    <div class="form-body">
      <!-- URL -->
      <div class="field">
        <div class="field-label" data-t="url_label"></div>
        <div class="url-wrap">
          <span id="urlIcon" class="url-icon">🔗</span>
          <input class="field-input url-input" id="urlInput" type="url"
            inputmode="url" autocomplete="off" oninput="handleUrl(this.value)"
            data-t-ph="url_ph">
        </div>
        <div class="link-preview" id="linkPreview">
          <div class="lp-thumb"    id="lpThumb">▶</div>
          <div>
            <div class="lp-platform" id="lpPlatform"></div>
            <div class="lp-title"    id="lpTitle"></div>
            <div class="lp-handle"   id="lpHandle"></div>
            <div class="lp-ok"       data-t="link_ok"></div>
          </div>
        </div>
        <div class="url-hint" data-t="url_hint"></div>
      </div>

      <!-- COMMENT -->
      <div class="field">
        <div class="field-label" data-t="comment_label"></div>
        <textarea class="field-textarea" id="commentInput" maxlength="300"
          oninput="document.getElementById('charCount').textContent=this.value.length"
          data-t-ph="comment_ph"></textarea>
        <div class="char-count"><span id="charCount">0</span>/300</div>
      </div>

      <!-- PREVIEW -->
      <div class="field">
        <div class="field-label" data-t="preview_label"></div>
        <div class="preview-card">
          <div class="pc-media" id="pcMedia2">🏋️</div>
          <div>
            <div class="pc-exercise" id="pcExercise2"></div>
            <div class="pc-weight"><span id="pcWeight2">—</span><span class="pc-unit" id="pcUnit2"></span></div>
            <div class="pc-meta" id="pcMeta2"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="form-footer">
      <button class="btn-p" onclick="publish()">
        <span data-t="publish_cta"></span><span>🔥</span>
      </button>
    </div>
  </div>

  <!-- ══ УСПЕХ ══ -->
  <div class="screen" id="s-success">
    <div class="success-icon">🔥</div>
    <div class="success-title" data-t="suc_title"></div>
    <div class="success-sub"   data-t="suc_sub"></div>
    <div class="success-card">
      <div class="sc-row">
        <div class="sc-label" data-t="ex_label"></div>
        <div class="sc-val" id="scEx">—</div>
      </div>
      <div class="sc-row">
        <div class="sc-label" data-t="weight_label"></div>
        <div class="sc-val" id="scW">—</div>
      </div>
      <div class="sc-sub" id="scMeta"></div>
    </div>
    <div class="success-actions">
      <button class="btn-p" onclick="goFeed()"><span data-t="suc_feed"></span><span>→</span></button>

function detectLang(){

  if(s==='ru'||s==='en') return s;
  const bl=(navigator.language||'ru').toLowerCase();
  return ['ru','uk','kk','be','uz','hy','az','ka','tg','tk','ky'].some(l=>bl.startsWith(l))?'ru':'en';
}

  applyLang();
}
function applyLang(){

function searchEx(q){
  if(selectedEx) return;
  const list=EXERCISES[lang]||EXERCISES.ru;
  const res=document.getElementById('exResults');
  const term=q.trim().toLowerCase();
  if(!term){res.classList.remove('show');res.innerHTML='';return;}
  const filtered=list.filter(e=>e.name.toLowerCase().includes(term)||e.cat.toLowerCase().includes(term));
  if(!filtered.length){res.classList.remove('show');res.innerHTML='';return;}
  res.innerHTML=filtered.slice(0,6).map((e,i)=>
    `<div class="ex-item" onclick="selectEx(${list.indexOf(e)})">
      <div><div class="ex-item-name">${e.icon} ${e.name}</div><div class="ex-item-cat">${e.cat}</div></div>
      <span style="color:var(--gray-light)">›</span>
    </div>`
  ).join('');
  res.classList.add('show');
}

function selectEx(idx){
  const list=EXERCISES[lang]||EXERCISES.ru;
  selectedEx=list[idx];
  document.getElementById('exInput').value='';
  document.getElementById('exResults').classList.remove('show');
  document.getElementById('exResults').innerHTML='';
  document.getElementById('exSelName').textContent=selectedEx.icon+' '+selectedEx.name;
  document.getElementById('exSelCat').textContent=selectedEx.cat;
  document.getElementById('exSelected').classList.add('show');
  document.getElementById('pcMedia').textContent=selectedEx.icon;
  document.getElementById('pcMedia2').textContent=selectedEx.icon;

  // Show/hide bodyweight toggle
  if(selectedEx.bw){
    document.getElementById('bwToggle').classList.add('show');
    setBWMode(); // refresh weight field visibility
  } else {
    document.getElementById('bwToggle').classList.remove('show');
    document.getElementById('weightField').style.display='';
  }
  updatePreview(); updateLevel(); checkStep1();
}

function clearEx(){

// ══════════════════════════════
//  LEVEL CALCULATION
// ══════════════════════════════
function updateLevel(){
  const badge=document.getElementById('levelBadge');
  if(!selectedEx) { badge.classList.remove('show'); return; }

  const rawW = parseFloat(document.getElementById('weightInput').value);
  let value;

  if(selectedEx.bw){
    if(bwMode==='bw'){
      // for bw exercises use reps as the metric
      value = recordType==='reps' ? reps : reps; // reps always
    } else {
      if(isNaN(rawW)||rawW<=0){ badge.classList.remove('show'); return; }
      value = unit==='lbs' ? rawW*0.453592 : rawW;
    }
  } else {
    if(isNaN(rawW)||rawW<=0){ badge.classList.remove('show'); return; }
    value = unit==='lbs' ? rawW*0.453592 : rawW;
  }

  const lv=selectedEx.lv;
  const t=T[lang];
  let idx=0;
  for(let i=0;i<lv.length;i++){ if(value>=lv[i]) idx=i; }

  const [icon,name,color]=t[LV_KEYS[idx]];
  const desc=t[LV_DESC[idx]];

  // progress within current level
  let pct=100, nextStr='';
  if(idx<lv.length-1){
    const lo=lv[idx], hi=lv[idx+1];
    pct=Math.min(99,Math.round(((value-lo)/(hi-lo))*100));
    const diff=Math.round((hi-value)*10)/10;
    nextStr=t.lv_next+(diff>0?'+'+diff+' '+(unit==='lbs'?t.lbs:t.kg):'');
  } else {
    nextStr=t.lv_peak;
  }

  document.getElementById('lvlIcon').textContent=icon;
  document.getElementById('lvlName').textContent=name;
  document.getElementById('lvlDesc').textContent=desc;
  document.getElementById('lvlBar').style.cssText=`width:${pct}%;background:${color};`;
  document.getElementById('lvlNext').textContent=nextStr;
  badge.style.cssText=`border:1px solid ${color}33;background:${color}0d;`;
  badge.classList.add('show');
}

function updatePreview(){
  const t=T[lang];
  const w=document.getElementById('weightInput').value||'—';
  const d=document.getElementById('dateInput').value;
  const unitLabel=t[unit]||unit;
  const exName=selectedEx?selectedEx.name:t.no_ex;
  const repsStr=recordType==='reps'
    ?(reps+' '+t.reps_unit)
    :(reps===1?'1 '+t.rep:reps+' '+t.reps_unit);

  let weightStr, unitStr;
  if(selectedEx&&selectedEx.bw&&bwMode==='bw'){
    weightStr=repsStr; unitStr='';
  } else {
    weightStr=w; unitStr=' '+unitLabel;
  }

  document.getElementById('pcExercise').textContent=exName;
  document.getElementById('pcWeight').textContent=weightStr;
  document.getElementById('pcUnit').textContent=unitStr;
  document.getElementById('pcMeta').textContent=(selectedEx&&selectedEx.bw&&bwMode==='bw'?'':(repsStr+' · '))+formatDate(d);
}

function syncStep2Preview(){
  ['pcExercise','pcWeight','pcUnit','pcMeta'].forEach(id=>{

function formatDate(iso){
  if(!iso) return '—';
  const[y,m,d]=iso.split('-');
  return d+'.'+m+'.'+y;
}

  const hasD=!!document.getElementById('dateInput').value;
  const hasReps=recordType==='1rm'||!!(document.getElementById('repsInput').value);

function handleUrl(val){
  val=val.trim();
  const preview=document.getElementById('linkPreview');
  const icon=document.getElementById('urlIcon');
  if(val.includes('tiktok.com')){
    icon.textContent='🎵';
    document.getElementById('lpPlatform').textContent='TikTok';
    document.getElementById('lpThumb').textContent='▶';
    document.getElementById('lpTitle').textContent=lang==='ru'?'Видео из TikTok':'TikTok video';
    document.getElementById('lpHandle').textContent=extractHandle(val,'tiktok');
    preview.classList.add('show');
  } else if(val.includes('instagram.com')||val.includes('instagr.am')){
    icon.textContent='📸';
    document.getElementById('lpPlatform').textContent='Instagram';
    document.getElementById('lpThumb').textContent=val.includes('/reel')?'▶':'📷';
    document.getElementById('lpTitle').textContent=lang==='ru'?'Публикация из Instagram':'Instagram post';
    document.getElementById('lpHandle').textContent=extractHandle(val,'instagram');
    preview.classList.add('show');
  } else if(val.includes('youtube.com')||val.includes('youtu.be')){
    icon.textContent='▶';
    document.getElementById('lpPlatform').textContent='YouTube';
    document.getElementById('lpThumb').textContent='▶';
    document.getElementById('lpTitle').textContent=lang==='ru'?'Видео YouTube':'YouTube video';
    document.getElementById('lpHandle').textContent='';
    preview.classList.add('show');
  } else {
    icon.textContent='🔗';
    preview.classList.remove('show');
  }
}
function extractHandle(url,platform){
  try{
    const parts=new URL(url).pathname.split('/').filter(Boolean);
    if(parts[0]) return '@'+parts[0].replace('@','');
  }catch(e){}
  return '';
}
